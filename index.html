<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Puppy Classifier · 4 Pup Model</title>
    <!-- Load ml5.js -->
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            background: #2d2d2d;
            border-radius: 24px;
            padding: 24px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
        }
        
        h1 {
            color: #f5b342;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 1.8rem;
        }
        
        .sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        
        .video-section {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid #f5b342;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
            /* Mirror for intuitive interaction */
        }
        
        .prediction-panel {
            background: #222;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #444;
        }
        
        .prediction-bar {
            margin: 12px 0;
        }
        
        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            color: #ddd;
            font-weight: 500;
            text-transform: capitalize;
        }
        
        .bar-bg {
            background: #333;
            height: 28px;
            border-radius: 14px;
            overflow: hidden;
            width: 100%;
        }
        
        .bar-fill {
            background: linear-gradient(90deg, #f5b342, #ffd966);
            height: 100%;
            width: 0%;
            transition: width 0.2s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: #1a1a1a;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .status {
            text-align: center;
            margin-top: 20px;
            color: #f5b342;
            font-family: monospace;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #f5b342;
        }
        
        .note {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            margin-top: 16px;
        }
        
        .button {
            background: #f5b342;
            color: #1a1a1a;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }
        
        .button:hover {
            background: #ffc107;
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🐕 PUPPY SPOTTER · 4 Pup Model</h1>
        <div class="sub">Trained on: 1st, 2nd, 3rd & 6th puppy</div>

        <div class="video-section">
            <video id="video" autoplay playsinline></video>
        </div>

        <div class="prediction-panel" id="predictionPanel">
            <div style="color: #f5b342; margin-bottom: 12px;">🔴 LIVE PREDICTIONS</div>
            <!-- Bars will be injected here by JavaScript -->
        </div>

        <div class="status" id="status">⏳ Initializing camera and model...</div>
        <div class="note">Ensure good lighting and a clear view of the puppy</div>
        <button class="button" id="resetBtn" style="width: 100%;">⟳ New Session</button>
    </div>

    <script>
        // === CONFIGURATION ===
        const modelURL = "https://teachablemachine.withgoogle.com/models/AnEAJM4cY/"; // Your model folder
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const predictionPanel = document.getElementById('predictionPanel');
        const resetBtn = document.getElementById('resetBtn');

        let classifier, labelList = [];
        let isModelReady = false;

        // === STEP 1: Load the model from Teachable Machine ===
        async function initModel() {
            try {
                statusEl.innerText = '⏳ Loading your puppy model...';
                // The folder URL points ml5 to the correct metadata
                classifier = await ml5.imageClassifier(modelURL);
                console.log('Model loaded successfully');

                // Get the labels (class names) from the model
                // This is a safe way to get them, as ml5 stores them internally
                // We'll create a placeholder first, then update after first prediction
                labelList = ['1st pup', '2nd pup', '3rd pup', '6th pup']; // Fallback if detection fails

                isModelReady = true;
                startVideo();
            } catch (error) {
                console.error('Model load error:', error);
                statusEl.innerText = '❌ Error loading model. Check console.';
            }
        }

        // === STEP 2: Start webcam ===
        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: 640,
                        height: 480
                    }
                });
                video.srcObject = stream;

                // Once video is playing, start classification loop
                video.onloadeddata = () => {
                    statusEl.innerText = '✅ Camera active. Analyzing...';
                    classifyFrame();
                };
            } catch (error) {
                console.error('Camera error:', error);
                statusEl.innerText = '❌ Camera access denied. Please allow permissions.';
            }
        }

        // === STEP 3: Continuous classification loop ===
        async function classifyFrame() {
            if (!isModelReady || !video || video.readyState < 2) {
                requestAnimationFrame(classifyFrame);
                return;
            }

            try {
                const results = await classifier.classify(video);
                updateUI(results);
            } catch (error) {
                console.warn('Classification error (retrying):', error);
            }

            // Loop forever
            requestAnimationFrame(classifyFrame);
        }

        // === STEP 4: Update the bars with fresh predictions ===
        function updateUI(results) {
            if (!results || results.length === 0) return;

            // Build the prediction bars HTML
            let html = '';

            // ml5 returns results sorted by confidence (highest first)
            // We'll show all classes, but you can filter if needed
            results.forEach((pred, index) => {
                const confidence = Math.round(pred.confidence * 100);
                const label = pred.label;

                // Map class names to friendly names if needed
                let displayLabel = label;
                // Simple mapping if labels are like "Class 1"
                if (label.toLowerCase().includes('class')) {
                    const classMap = {
                        'class 1': '1st Pup',
                        'class 2': '2nd Pup',
                        'class 3': '3rd Pup',
                        'class 4': '6th Pup'
                    };
                    displayLabel = classMap[label.toLowerCase()] || label;
                }

                html += `
                    <div class="prediction-bar">
                        <div class="label-row">
                            <span>${displayLabel}</span>
                            <span>${confidence}%</span>
                        </div>
                        <div class="bar-bg">
                            <div class="bar-fill" style="width: ${confidence}%;">
                                ${confidence > 30 ? confidence + '%' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            predictionPanel.innerHTML = `
                <div style="color: #f5b342; margin-bottom: 12px;">🔴 LIVE PREDICTIONS</div>
                ${html}
            `;
        }

        // === Reset/Cleanup Function ===
        function resetSession() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            predictionPanel.innerHTML = `<div style="color: #f5b342; margin-bottom: 12px;">🔴 LIVE PREDICTIONS</div>
                                          <div style="color: #aaa; text-align: center; padding: 20px;">Restarting...</div>`;
            statusEl.innerText = '⏳ Reinitializing...';
            isModelReady = false;

            // Short delay then restart
            setTimeout(() => {
                initModel();
            }, 500);
        }

        // === Start everything ===
        initModel();

        // Event listener for reset button
        resetBtn.addEventListener('click', resetSession);
    </script>
</body>

</html>
